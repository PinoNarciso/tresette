<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tressette Pro - Pino Narciso</title>
    
    <!-- Icona App e Integrazione Mobile -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com">
    <meta name="theme-color" content="#1e4d2b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --panno: #1e4d2b; 
            --legno: #3e2723;
            --oro: #d4af37;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --danger: #e74c3c;
            --success: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle, var(--panno) 0%, #0a1f11 100%);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; color: var(--text);
        }
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 420px; 
            box-sizing: border-box; border-top: 5px solid var(--oro);
        }
        h1 { text-align: center; color: var(--legno); font-size: 1.6rem; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        label { font-size: 0.8rem; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ecf0f1; 
            margin-bottom: 15px; box-sizing: border-box; font-size: 1.1rem; transition: 0.3s;
            background: white;
        }
        input:focus, select:focus { border-color: var(--panno); outline: none; }

        button { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; color: white; transition: 0.3s; font-size: 1rem;
        }
        .btn-main { background: var(--panno); box-shadow: 0 4px 0 #14351d; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }
        
        #confirm-btn { background: #bdc3c7; color: #7f8c8d; }
        #confirm-btn.ready { background: var(--success); color: white; box-shadow: 0 4px 0 #1e8449; }

        .player-card { 
            background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border-left: 5px solid var(--panno);
        }
        .player-name { font-size: 1.1rem; font-weight: bold; color: var(--legno); margin-bottom: 10px; display: block; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .accuso-quick { display: flex; gap: 5px; margin-top: 8px; }
        .btn-q { padding: 8px 10px; font-size: 0.8rem; background: #eee; color: #444; border-radius: 6px; border: 1px solid #ccc; flex: 1; text-align: center; font-weight: bold; }
        .btn-q:active { background: #ddd; }

        .sum-check { 
            font-weight: bold; text-align: center; padding: 12px; border-radius: 12px; 
            margin: 15px 0; font-size: 1rem; border: 2px dashed #ddd;
        }
        .sum-ok { background: #e9f7ef; color: var(--success); border-color: var(--success); }
        .sum-err { background: #fdf2f2; color: var(--danger); border-color: #fadbd8; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 15px; }
        th { color: #95a5a6; font-size: 0.75rem; text-transform: uppercase; padding: 5px; }
        td { background: #fff; padding: 12px 8px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        td:first-child { border-left: 1px solid #eee; border-radius: 10px 0 0 10px; }
        td:last-child { border-right: 1px solid #eee; border-radius: 0 10px 10px 0; }
        .badge { background: var(--panno); color: white; padding: 3px 7px; border-radius: 6px; margin: 2px; font-size: 0.8rem; display: inline-block; }
        
        .winner { background: #fff3cd !important; border: 2px solid var(--oro) !important; }
        .hidden { display: none; }

        footer { 
            margin-top: 40px; margin-bottom: 20px; padding: 15px 30px; 
            background: rgba(255,255,255,0.15); border-radius: 50px; 
            color: #ffffff; font-size: 0.9rem; text-align: center; 
            letter-spacing: 1px; line-height: 1.6; 
            border: 1px solid rgba(255,255,255,0.25); 
            backdrop-filter: blur(8px); width: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        footer strong { color: var(--oro); text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>Punteggio Tressette 🃏</h1>
        <label>PUNTI VITTORIA</label>
        <select id="limit">
            <option value="31">31 Punti</option>
            <option value="41">41 Punti</option>
        </select>
        <label>SQUADRE (es: Noi, Voi)</label>
        <input id="names" value="Noi, Voi" placeholder="Inserisci nomi...">
        <button class="btn-main" onclick="start()">INIZIA PARTITA</button>
    </div>

    <div class="card hidden" id="game">
        <h1 id="displayHeader">Punteggio</h1>
        <div id="inputs-area"></div>
        <div id="sum-display" class="sum-check sum-err">Prese: 0 / 11</div>
        <button id="confirm-btn" onclick="addRound()" disabled>CONFERMA MANO</button>

        <table>
            <thead><tr><th>Squadra</th><th>Tot</th><th>Storico</th></tr></thead>
            <tbody id="ranking-body"></tbody>
        </table>

        <div style="margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button style="background:#f3f4f6; color:#4b5563; font-size:0.75rem; line-height: 1.2" onclick="undoLast()">↩ Annulla Ultima Mano</button>
            <button style="background:#34495e; color: white; font-size:0.85rem" onclick="shareResults()">📤 Condividi</button>
        </div>
        <button style="background:transparent; color:#94a3b8; font-size:0.75rem; margin-top:20px; border:none; width:100%" onclick="resetGame()">🔄 Nuova Partita</button>
    </div>

    <footer>
        &copy; 2026 - Tutti i diritti riservati<br>
        Sviluppato da <strong>Pino Narciso</strong>
    </footer>

<script>
    let players = [], history = [], limit = 31, isGameOver = false;

    window.onload = () => {
        const saved = localStorage.getItem('tressette_pino_final');
        if (saved) { Object.assign(this, JSON.parse(saved)); showGame(); render(); }
    };

    function start() {
        const names = document.getElementById('names').value.split(',').map(n => n.trim()).filter(n => n);
        if (names.length < 2) return alert('Inserisci i nomi delle squadre!');
        limit = parseInt(document.getElementById('limit').value);
        players = names.map((n, i) => ({ id: i, name: n, score: 0, playerHistory: [] }));
        showGame(); save(); render();
    }

    function showGame() { document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); }

    function render() {
        const inputDiv = document.getElementById('inputs-area');
        inputDiv.innerHTML = '';
        if (!isGameOver) {
            players.forEach(p => {
                inputDiv.innerHTML += `
                <div class="player-card">
                    <span class="player-name">${p.name}</span>
                    <div class="grid-inputs">
                        <div class="input-box"><span>Prese</span><input type="number" inputmode="numeric" class="score-in" data-id="${p.id}" oninput="checkSum()" placeholder="0"></div>
                        <div class="input-box"><span>Accuso</span><input type="number" id="accuso-${p.id}" inputmode="numeric" class="accuso-in" data-id="${p.id}" placeholder="0">
                            <div class="accuso-quick">
                                <div class="btn-q" onclick="quickAccuso(${p.id}, 3)">+3</div>
                                <div class="btn-q" onclick="quickAccuso(${p.id}, 4)">+4</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        } else { inputDiv.innerHTML = `<div class="sum-check sum-ok" style="font-size:1.2rem">🏆 PARTITA CONCLUSA!</div>`; }
        renderRanking(); checkSum();
    }

    function quickAccuso(id, val) { const el = document.getElementById(`accuso-${id}`); el.value = (parseInt(el.value) || 0) + val; }

    function checkSum() {
        let sum = 0; document.querySelectorAll('.score-in').forEach(i => sum += parseInt(i.value || 0));
        const display = document.getElementById('sum-display');
        const btn = document.getElementById('confirm-btn');
        display.innerText = `Prese totali: ${sum} / 11`;
        const ok = (sum === 11) && !isGameOver;
        btn.disabled = !ok;
        btn.classList.toggle('ready', ok);
        display.className = `sum-check ${ok ? 'sum-ok' : 'sum-err'}`;
    }

    function addRound() {
        const snapshot = {};
        players.forEach(p => {
            const prese = parseInt(document.querySelector(`.score-in[data-id="${p.id}"]`).value || 0);
            const accuso = parseInt(document.querySelector(`.accuso-in[data-id="${p.id}"]`).value || 0);
            const totaleMano = prese + accuso;
            snapshot[p.id] = { prevScore: p.score };
            p.score += totaleMano;
            p.playerHistory.push(totaleMano);
        });
        players.forEach(p => { if (p.score >= limit) isGameOver = true; });
        history.push({ snapshot });
        save(); render();
    }

    function renderRanking() {
        const rank = document.getElementById('ranking-body');
        rank.innerHTML = '';
        [...players].sort((a,b) => b.score - a.score).forEach(p => {
            const win = p.score >= limit ? 'class="winner"' : '';
            const badges = p.playerHistory.map(pt => `<span class="badge">${pt}</span>`).join('');
            rank.innerHTML += `<tr ${win}><td><strong>${p.name}</strong></td><td style="font-size:1.2rem; color:var(--panno)">${p.score}</td><td><div style="overflow-x:auto; max-width:140px; white-space:nowrap">${badges || '-'}</div></td></tr>`;
        });
    }

    function undoLast() {
        if (!history.length) return;
        const last = history.pop();
        players.forEach(p => { p.score = last.snapshot[p.id].prevScore; p.playerHistory.pop(); });
        isGameOver = false; save(); render();
    }

    function shareResults() {
        let t = `🎴 *Tressette Pro* (Obiettivo: ${limit})\n\n`;
        players.forEach(p => t += `• ${p.name}: ${p.score} pt\n`);
        if (navigator.share) navigator.share({ text: t }); else alert('Copiato!');
    }

    function save() { localStorage.setItem('tressette_pino_final', JSON.stringify({ players, history, limit, isGameOver })); }
    function resetGame() { if(confirm('Vuoi ricominciare?')) { localStorage.removeItem('tressette_pino_final'); location.reload(); } }
</script>
</body>
</html>
