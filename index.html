<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punteggio Tressette - Pino Narciso</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com">
    <meta name="theme-color" content="#1e4d2b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --panno: #1e4d2b; --legno: #3e2723; --oro: #d4af37;
            --card-bg: #ffffff; --text: #2c3e50; --danger: #e74c3c; --success: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle, var(--panno) 0%, #0a1f11 100%);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; color: var(--text);
        }
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 420px; 
            box-sizing: border-box; border-top: 5px solid var(--oro);
        }
        h1 { text-align: center; color: var(--legno); font-size: 1.6rem; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        label { font-size: 0.75rem; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ecf0f1; 
            margin-bottom: 8px; box-sizing: border-box; font-size: 1.1rem; transition: 0.3s;
            background: white; text-align: center;
        }
        input:focus { border-color: var(--panno); outline: none; }

        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: white; transition: 0.2s; }
        .btn-main { background: var(--panno); box-shadow: 0 4px 0 #14351d; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }
        
        #confirm-btn { background: #bdc3c7; color: #7f8c8d; }
        #confirm-btn.ready { background: var(--success); color: white; box-shadow: 0 4px 0 #1e8449; }

        .quick-btns { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-q { padding: 8px; font-size: 0.75rem; background: #f1f5f9; color: var(--legno); border: 1px solid #cbd5e1; border-radius: 8px; flex: 1; }
        .btn-q:active { background: #e2e8f0; }
        .btn-rete { background: #34495e; color: white; border-color: #2c3e50; }
        .btn-cappotto { background: #e74c3c; color: white; border-color: #c0392b; }

        .player-card { 
            background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border-left: 5px solid var(--panno);
        }
        .dealer-active { border-left-color: var(--oro); background: #fffdf5 !important; border-right: 1px solid var(--oro); }
        .player-name { font-size: 1.1rem; font-weight: bold; color: var(--legno); margin-bottom: 10px; display: block; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .sum-check { font-weight: bold; text-align: center; padding: 12px; border-radius: 12px; margin: 15px 0; border: 2px dashed #ddd; }
        .sum-ok { background: #e9f7ef; color: var(--success); border-color: var(--success); }
        .sum-err { background: #fdf2f2; color: var(--danger); border-color: #fadbd8; }

        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: #95a5a6; font-size: 0.65rem; text-transform: uppercase; padding: 5px; min-width: 45px; }
        td { background: #fff; padding: 10px 5px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        td:first-child { border-left: 1px solid #eee; border-radius: 10px 0 0 10px; text-align: left; font-weight: bold; padding-left: 10px; }
        td:last-child { border-right: 1px solid #eee; border-radius: 0 10px 10px 0; }
        .badge { background: var(--panno); color: white; padding: 3px 7px; border-radius: 6px; font-size: 0.8rem; }
        
        .winner { background: #fff3cd !important; border: 2px solid var(--oro) !important; }
        .hidden { display: none; }
        .btn-reset { background: #34495e; color: #ecf0f1; border: 1px solid var(--oro); margin-top: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>Punteggio Tressette</h1>
        <label>Punti Vittoria</label>
        <select id="limit"><option value="31">31 Punti</option><option value="41">41 Punti</option></select>
        <label>Squadre (es: Noi, Voi)</label>
        <input id="names" value="Noi, Voi">
        <button class="btn-main" onclick="start()">INIZIA PARTITA</button>
    </div>

    <div class="card hidden" id="game">
        <h1 id="displayHeader">Punteggio</h1>
        <div id="inputs-area"></div>
        <div id="sum-display" class="sum-check sum-err">Prese: 0 / 11</div>
        <button id="confirm-btn" onclick="addRound()" disabled>CONFERMA MANO</button>

        <div class="table-container">
            <table><thead id="ranking-head"></thead><tbody id="ranking-body"></tbody></table>
        </div>

        <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button style="background:#f3f4f6; color:#4b5563; font-size:0.75rem" onclick="undoLast()">↩ Annulla Ultima Mano</button>
            <button style="background:#d4af37; color: #3e2723; font-size:0.85rem" onclick="shareResults()">📤 Condividi</button>
        </div>
        <button class="btn-reset" onclick="resetGame()">🔄 Nuova Partita</button>
    </div>

<script>
    let players = [], limit = 31, isGameOver = false, dealerIndex = -1;

    // CARICAMENTO DATI ALL'AVVIO
    window.onload = () => {
        const saved = localStorage.getItem('tressette_pino_v2');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players;
            limit = data.limit;
            dealerIndex = data.dealerIndex;
            isGameOver = data.isGameOver;
            showGame();
            render();
        }
    };

    function save() {
        localStorage.setItem('tressette_pino_v2', JSON.stringify({players, limit, dealerIndex, isGameOver}));
    }

    function start() {
        const names = document.getElementById('names').value.split(',').map(n => n.trim()).filter(n => n);
        if (names.length < 2) return alert('Inserisci i nomi delle squadre!');
        limit = parseInt(document.getElementById('limit').value);
        players = names.map((n, i) => ({ id: i, name: n, score: 0, playerHistory: [] }));
        isGameOver = false; dealerIndex = -1;
        showGame(); save(); render();
    }

    function showGame() { document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); }

    function quickAccuso(id, val) {
        const el = document.getElementById(`accuso-${id}`);
        el.value = (parseInt(el.value) || 0) + val;
        checkSum();
    }

    function calculateRete(id) {
        const otherInput = [...document.querySelectorAll('.score-in')].find(i => i.dataset.id != id);
        const valOther = parseInt(otherInput.value) || 0;
        const myInput = document.querySelector(`.score-in[data-id="${id}"]`);
        myInput.value = Math.max(0, 11 - valOther);
        checkSum();
    }

    function makeCappotto(id) {
        document.querySelectorAll('.score-in').forEach(input => {
            input.value = (input.dataset.id == id) ? 11 : 0;
        });
        checkSum();
    }

    function checkSum() {
        let total = 0;
        document.querySelectorAll('.score-in').forEach(i => total += parseInt(i.value) || 0);
        const sumDiv = document.getElementById('sum-display');
        const confirmBtn = document.getElementById('confirm-btn');
        sumDiv.innerText = `Prese: ${total} / 11`;
        if (total === 11) {
            sumDiv.className = "sum-check sum-ok";
            confirmBtn.disabled = false; confirmBtn.classList.add('ready');
        } else {
            sumDiv.className = "sum-check sum-err";
            confirmBtn.disabled = true; confirmBtn.classList.remove('ready');
        }
    }

    function addRound() {
        if (dealerIndex === -1) {
            let scelta = prompt(players.map((p, i) => `${i + 1}: ${p.name}`).join('\n') + "\nChi è il cartaro?");
            dealerIndex = (parseInt(scelta) - 1) || 0;
        }
        players.forEach(p => {
            const prese = parseInt(document.querySelector(`.score-in[data-id="${p.id}"]`).value) || 0;
            const accuso = parseInt(document.getElementById(`accuso-${p.id}`).value) || 0;
            p.score += (prese + accuso);
            p.playerHistory.push(prese + accuso);
        });
        dealerIndex = (dealerIndex + 1) % players.length;
        const maxS = Math.max(...players.map(p => p.score));
        if (maxS >= limit && players.filter(p => p.score === maxS).length === 1) isGameOver = true;
        save(); render();
    }

    function render() {
        const inputArea = document.getElementById('inputs-area');
        const thead = document.getElementById('ranking-head');
        const tbody = document.getElementById('ranking-body');
        const maxMani = players.length > 0 ? Math.max(...players.map(p => p.playerHistory.length)) : 0;

        let headHtml = `<tr><th>Squadra</th><th>Tot</th>`;
        for(let i = maxMani; i >= 1; i--) headHtml += `<th>M${i}</th>`;
        thead.innerHTML = headHtml + `</tr>`;

        inputArea.innerHTML = '';
        if (!isGameOver) {
            document.getElementById('displayHeader').innerHTML = dealerIndex === -1 ? "Punteggio" : `Mano di: ${players[dealerIndex].name} 🃏`;
            players.forEach((p, idx) => {
                inputArea.innerHTML += `
                <div class="player-card ${idx === dealerIndex ? 'dealer-active' : ''}">
                    <span class="player-name">${p.name} ${idx === dealerIndex ? '🃏' : ''}</span>
                    <div class="grid-inputs">
                        <div>
                            <label>Prese</label>
                            <input type="number" inputmode="numeric" class="score-in" data-id="${p.id}" oninput="checkSum()">
                            <div class="quick-btns">
                                <button class="btn-q btn-rete" onclick="calculateRete(${p.id})">RETE</button>
                                <button class="btn-q btn-cappotto" onclick="makeCappotto(${p.id})">CAP.</button>
                            </div>
                        </div>
                        <div>
                            <label>Accuso</label>
                            <input type="number" inputmode="numeric" id="accuso-${p.id}">
                            <div class="quick-btns">
                                <button class="btn-q" onclick="quickAccuso(${p.id}, 3)">+3</button>
                                <button class="btn-q" onclick="quickAccuso(${p.id}, 4)">+4</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        } else {
            const v = [...players].sort((a,b) => b.score - a.score);
            inputArea.innerHTML = `<h2 style="text-align:center; color:var(--oro)">VINCE: ${v[0].name} 🏆</h2>`;
        }

        tbody.innerHTML = '';
        [...players].sort((a,b) => b.score - a.score).forEach(p => {
            let h = '';
            for(let i = maxMani - 1; i >= 0; i--) h += `<td>${p.playerHistory[i] ?? '-'}</td>`;
            tbody.innerHTML += `<tr class="${isGameOver && p.score === Math.max(...players.map(x=>x.score)) ? 'winner' : ''}">
                <td>${p.name}</td><td><span class="badge">${p.score}</span></td>${h}</tr>`;
        });
        checkSum();
    }

    function undoLast() {
        players.forEach(p => { if (p.playerHistory.length > 0) p.score -= p.playerHistory.pop(); });
        if (dealerIndex !== -1) dealerIndex = (dealerIndex - 1 + players.length) % players.length;
        isGameOver = false; save(); render();
    }

    function shareResults() {
        let t = `🃏 Tressette: ${players.map(p => `${p.name} ${p.score}pt`).join(' - ')}`;
        navigator.share ? navigator.share({text: t}) : alert(t);
    }

    function resetGame() { if(confirm("Vuoi resettare la partita attuale?")) { localStorage.removeItem('tressette_pino_v2'); location.reload(); } }
</script>
</body>
</html>
